name: Verify And Deploy

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  verify-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Install npm dependencies
        run: nix develop .#default -c npm ci

      - name: Verify
        run: nix develop .#default -c npm run verify

      - name: Configure git remote for deploy
        run: git remote set-url origin https://git:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy
        run: nix develop .#default -c npm run deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
