name: AWS Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      aws_region:
        description: AWS region override
        required: false
        type: string
      stack_name:
        description: Stack name override
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  AWS_REGION: ${{ inputs.aws_region || vars.AWS_REGION || 'ap-southeast-2' }}
  FITZBEACH_AWS_STACK_NAME: ${{ inputs.stack_name || vars.FITZBEACH_AWS_STACK_NAME || 'fitzbeach-aws' }}
  FITZBEACH_AWS_PROJECT_NAME: ${{ vars.FITZBEACH_AWS_PROJECT_NAME || 'fitzbeach' }}

permissions:
  contents: read
  id-token: write

concurrency:
  group: aws-deploy-${{ github.ref }}-${{ inputs.stack_name || vars.FITZBEACH_AWS_STACK_NAME || 'fitzbeach-aws' }}
  cancel-in-progress: false

jobs:
  verify-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.5.0
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Verify
        run: npm run verify

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

      - name: Deploy infrastructure and backend
        run: npm run aws:deploy

      - name: Publish frontend
        run: npm run aws:frontend:publish
