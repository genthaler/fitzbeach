name: AWS Destroy

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: AWS region override
        required: false
        type: string
      stack_name:
        description: Stack name to destroy
        required: false
        type: string
      confirm_destroy:
        description: Type destroy to confirm
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  AWS_REGION: ${{ inputs.aws_region || vars.AWS_REGION || 'ap-southeast-2' }}
  FITZBEACH_AWS_STACK_NAME: ${{ inputs.stack_name || vars.FITZBEACH_AWS_STACK_NAME || 'fitzbeach-aws' }}
  FITZBEACH_AWS_PROJECT_NAME: ${{ vars.FITZBEACH_AWS_PROJECT_NAME || 'fitzbeach' }}

permissions:
  contents: read
  id-token: write

concurrency:
  group: aws-destroy-${{ inputs.stack_name || vars.FITZBEACH_AWS_STACK_NAME || 'fitzbeach-aws' }}
  cancel-in-progress: false

jobs:
  destroy:
    runs-on: ubuntu-latest

    steps:
      - name: Require explicit confirmation
        run: |
          test "${{ inputs.confirm_destroy }}" = "destroy"

      - name: Check out repository
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

      - name: Destroy stack
        run: npm run -w aws destroy
